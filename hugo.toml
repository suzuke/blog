baseURL = 'https://suzuke.github.io/blog/'
defaultContentLanguage = 'en'
theme = 'PaperMod'
paginate = 10

[params]
  defaultTheme = "dark"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/suzuke"

[params.assets]
  favicon = "/favicon.ico"

[markup]
  [markup.highlight]
    style = 'dracula'
    lineNos = false
    noClasses = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# ── Languages ────────────────────────────────────────────

[languages]

  [languages.en]
    languageName = "EN"
    weight = 1
    title = "suzuke"
    description = "AI experiments, autonomous agents, and things that break in interesting ways."

    [languages.en.params.homeInfoParams]
      Title = "suzuke"
      Content = "Building tools for autonomous AI experiments. Currently working on [Crucible](https://github.com/suzuke/autocrucible) — autoresearch with guardrails."

    [[languages.en.menu.main]]
      identifier = "posts"
      name = "Posts"
      url = "/posts/"
      weight = 10
    [[languages.en.menu.main]]
      identifier = "tags"
      name = "Tags"
      url = "/tags/"
      weight = 20
    [[languages.en.menu.main]]
      identifier = "archives"
      name = "Archive"
      url = "/archives/"
      weight = 30
    [[languages.en.menu.main]]
      identifier = "search"
      name = "Search"
      url = "/search/"
      weight = 40

  [languages.zh-tw]
    languageName = "中文"
    weight = 2
    title = "suzuke"
    description = "AI 實驗、自主 agent、以及各種有趣的壞掉方式。"

    [languages.zh-tw.params.homeInfoParams]
      Title = "suzuke"
      Content = "做自主 AI 實驗的工具。目前在做 [Crucible](https://github.com/suzuke/autocrucible) — 有護欄的 autoresearch。"

    [[languages.zh-tw.menu.main]]
      identifier = "posts"
      name = "文章"
      url = "/zh-tw/posts/"
      weight = 10
    [[languages.zh-tw.menu.main]]
      identifier = "tags"
      name = "標籤"
      url = "/zh-tw/tags/"
      weight = 20
    [[languages.zh-tw.menu.main]]
      identifier = "archives"
      name = "歸檔"
      url = "/zh-tw/archives/"
      weight = 30
    [[languages.zh-tw.menu.main]]
      identifier = "search"
      name = "搜尋"
      url = "/zh-tw/search/"
      weight = 40

[outputs]
  home = ["HTML", "RSS", "JSON"]
